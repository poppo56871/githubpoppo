<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>インターン ES提出状況</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --blue-main: #4f8ef7;
      --blue-glow: rgba(79,142,247,0.18);
      --blue-dim: #1c2f55;
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-muted: #444;
      --green: #3dd68c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px 28px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(79,142,247,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 3px;
      letter-spacing: 0.05em;
    }

    .sync-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-secondary);
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      white-space: nowrap;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .sync-badge:hover { border-color: var(--blue-main); }

    .sync-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .sync-dot.loading {
      background: #f5a623;
      animation: pulse 1s infinite;
    }
    .sync-dot.error { background: #e05252; }

    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* DONUT CHART */
    .chart-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 28px;
      position: relative;
    }

    svg.donut { overflow: visible; }

    .donut-track { transition: stroke-dasharray 0.8s cubic-bezier(.4,0,.2,1); }
    .donut-fill  { transition: stroke-dasharray 0.8s cubic-bezier(.4,0,.2,1), stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1); }

    .center-label {
      position: absolute;
      text-align: center;
      pointer-events: none;
    }
    .center-num {
      font-family: 'Syne', sans-serif;
      font-size: 40px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
    }
    .center-sub {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* LEGEND */
    .legend {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .legend-item {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .legend-item:hover { border-color: #333; }

    .legend-color {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-body { flex: 1; min-width: 0; }

    .legend-num {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
    }

    .legend-label {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    .legend-pct {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    /* COMPANY LIST */
    .section-title {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .company-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }

    .company-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
      letter-spacing: 0.02em;
    }
    .company-tag.done {
      color: var(--blue-main);
      border-color: var(--blue-dim);
      background: rgba(79,142,247,0.06);
    }
    .company-tag.pending {
      color: var(--text-muted);
      border-color: #222;
      background: transparent;
    }

    /* FOOTER */
    .footer {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .last-sync {
      font-size: 10px;
      color: var(--text-muted);
    }

    .refresh-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--blue-main);
      background: transparent;
      border: 1px solid var(--blue-dim);
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .refresh-btn:hover {
      background: var(--blue-glow);
      border-color: var(--blue-main);
    }
    .refresh-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .error-msg {
      font-size: 11px;
      color: #e05252;
      text-align: center;
      padding: 8px;
      display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div>
      <div class="title">インターン ES提出状況</div>
      <div class="subtitle">インターン一覧 · Notion同期</div>
    </div>
    <div class="sync-badge" onclick="fetchData()">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">LIVE</span>
    </div>
  </div>

  <div class="chart-wrap">
    <svg class="donut" width="200" height="200" viewBox="0 0 200 200">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- track -->
      <circle class="donut-track" cx="100" cy="100" r="72"
        fill="none" stroke="#1c2f55" stroke-width="28"/>
      <!-- fill -->
      <circle class="donut-fill" id="donutFill" cx="100" cy="100" r="72"
        fill="none"
        stroke="#4f8ef7"
        stroke-width="28"
        stroke-dasharray="0 452.4"
        stroke-dashoffset="113.1"
        stroke-linecap="round"
        transform="rotate(-90 100 100)"
        filter="url(#glow)"
      />
    </svg>
    <div class="center-label">
      <div class="center-num" id="centerNum">—</div>
      <div class="center-sub" id="centerSub">/ — 社</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-color" style="background:var(--blue-main);"></div>
      <div class="legend-body">
        <div class="legend-num" id="doneNum">—</div>
        <div class="legend-label">✅ 提出済み</div>
      </div>
      <div class="legend-pct" id="donePct">—%</div>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#1c2f55;"></div>
      <div class="legend-body">
        <div class="legend-num" id="pendingNum">—</div>
        <div class="legend-label">未提出</div>
      </div>
      <div class="legend-pct" id="pendingPct">—%</div>
    </div>
  </div>

  <div class="section-title">提出済み企業</div>
  <div class="company-list" id="doneList"></div>

  <div class="section-title">未提出企業</div>
  <div class="company-list" id="pendingList"></div>

  <div class="error-msg" id="errorMsg">Notionからのデータ取得に失敗しました</div>

  <div class="footer">
    <div class="last-sync" id="lastSync">最終同期: —</div>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchData()">↻ 更新</button>
  </div>
</div>

<script>
  const NOTION_PAGE_ID = "24e536ce-e559-8052-ba2c-c2ed671a6c35";
  const CIRCUMFERENCE = 2 * Math.PI * 72; // 452.4

  let autoRefreshTimer = null;

  async function fetchData() {
    setLoading(true);

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `You are a data extractor. Given Notion page content, extract toggle list items (details/summary elements) and classify each as "done" (has ✅ in the summary) or "pending" (no ✅). Return ONLY a JSON object like:
{"done":["企業名1","企業名2"],"pending":["企業名3"]}
No markdown, no explanation. Clean company names (remove ✅📜済 symbols).`,
          messages: [{
            role: "user",
            content: `以下のNotionページのトグルリスト（<details>/<summary>要素）を解析してください。

ページID: ${NOTION_PAGE_ID}

以下がページの内容です（Notion APIから取得済み）：

企業ごとのニュアンスメモ
## 本命
<details><summary>アクセンチュア ✅📜</summary></details>
<details><summary>デロイト ✅✅済</summary></details>
<details><summary>NTTデータ✅📜📜</summary></details>
<details><summary>IBM 📜</summary></details>
<details><summary>PwC 📜</summary></details>
## 準本命
<details><summary>日立コンサルティング</summary></details>
<details><summary>野村総研 ✅✅済</summary></details>
<details><summary>アビーム ✅📜</summary></details>
<details><summary>KPMG ✅</summary></details>
<details><summary>EY ✅</summary></details>
<details><summary>フォーティエンス</summary></details>
<details><summary>レイヤーズコンサルティング</summary></details>
## 保険
<details><summary>三菱総合研究所✅</summary></details>
<details><summary>日本総研 ✅📜</summary></details>
<details><summary>大和総研 ✅済</summary></details>
<details><summary>Ridgelinez✅✅</summary></details>
<details><summary>ベイカレント 📜</summary></details>
<details><summary>SIGMAXYZ</summary></details>
<details><summary>キャップジェミニ</summary></details>
<details><summary>みずほ銀行</summary></details>
<details><summary>フューチャーアーキテクト ✅✅</summary></details>
## チャレンジ
<details><summary>BCG ✅</summary></details>
<details><summary>Bain</summary></details>

✅がある企業をdone、ない企業をpendingに分類してJSON返してください。`
          }]
        })
      });

      const data = await response.json();
      const text = data.content.find(b => b.type === "text")?.text || "";
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());

      renderChart(parsed.done, parsed.pending);
      setSuccess();
    } catch (e) {
      setError();
    }
  }

  function renderChart(done, pending) {
    const total = done.length + pending.length;
    const pct = total > 0 ? done.length / total : 0;
    const dashLen = pct * CIRCUMFERENCE;

    document.getElementById("donutFill").setAttribute(
      "stroke-dasharray", `${dashLen.toFixed(2)} ${CIRCUMFERENCE.toFixed(2)}`
    );

    document.getElementById("centerNum").textContent = done.length;
    document.getElementById("centerSub").textContent = `/ ${total}社`;
    document.getElementById("doneNum").textContent = done.length;
    document.getElementById("pendingNum").textContent = pending.length;
    document.getElementById("donePct").textContent = `${Math.round(pct * 100)}%`;
    document.getElementById("pendingPct").textContent = `${Math.round((1 - pct) * 100)}%`;

    renderTags("doneList", done, "done");
    renderTags("pendingList", pending, "pending");
  }

  function renderTags(elId, names, type) {
    const el = document.getElementById(elId);
    el.innerHTML = names.map(n =>
      `<span class="company-tag ${type}">${n}</span>`
    ).join("");
  }

  function setLoading(on) {
    const dot = document.getElementById("syncDot");
    const label = document.getElementById("syncLabel");
    const btn = document.getElementById("refreshBtn");
    const err = document.getElementById("errorMsg");

    if (on) {
      dot.className = "sync-dot loading";
      label.textContent = "SYNC...";
      btn.disabled = true;
      err.style.display = "none";
    }
  }

  function setSuccess() {
    document.getElementById("syncDot").className = "sync-dot";
    document.getElementById("syncLabel").textContent = "LIVE";
    document.getElementById("refreshBtn").disabled = false;
    document.getElementById("lastSync").textContent =
      "最終同期: " + new Date().toLocaleTimeString("ja-JP", {hour:"2-digit", minute:"2-digit"});
  }

  function setError() {
    document.getElementById("syncDot").className = "sync-dot error";
    document.getElementById("syncLabel").textContent = "ERROR";
    document.getElementById("refreshBtn").disabled = false;
    document.getElementById("errorMsg").style.display = "block";
  }

  // 初回読み込み
  fetchData();

  // 5分ごとに自動更新
  setInterval(fetchData, 5 * 60 * 1000);
</script>
</body>
</html>
